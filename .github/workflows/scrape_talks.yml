name: Scrape Talk Locations

on:
  workflow_dispatch:
  push:
    paths:
      - '_talks/**'
      - 'talkmap.ipynb'

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'  # Specify the Python version you need

    - name: Install dependencies
      run: |
        pip install jupyter pandas requests beautifulsoup4 geopy  # Add other dependencies as needed
        pip install getorg --upgrade

    - name: Run Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb

    - name: Commit changes
      id: commit_changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff --cached --quiet; then
          echo "committed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        git commit -m "Automated update of talk locations"
        git pull --rebase origin "$GITHUB_REF_NAME"
        git push origin HEAD:"$GITHUB_REF_NAME"
        echo "committed=true" >> "$GITHUB_OUTPUT"

    - name: Request Pages build
      if: steps.commit_changes.outputs.committed == 'true'
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        curl --fail-with-body -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
